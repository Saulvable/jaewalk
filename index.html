<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JaeWalk</title>
  <link rel="icon" href="/favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico"/>
  <link rel="apple-touch-icon" href="/icons/icon-192.png"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; background:#1a1a2e; color:#fff; height:100vh; display:flex; overflow:hidden; }

    /* ── 사이드바 ── */
    #sidebar { width:320px; min-width:200px; background:#16213e; border-right:1px solid #0f3460; display:flex; flex-direction:column; overflow:hidden; }
    #sidebar-header { padding:6px 12px 5px; border-bottom:1px solid #0f3460; background:#0f3460; flex-shrink:0; }
    #sidebar-header-row { display:flex; align-items:center; gap:6px; margin-bottom:2px; }
    #sidebar-header h1 { font-size:18px; font-weight:700; color:#FF3D5A; letter-spacing:2px; flex:1; }
    #back-btn { display:none; background:transparent; border:1px solid #FF3D5A44; color:#FF3D5A; border-radius:6px; padding:3px 10px; font-size:12px; cursor:pointer; }
    #back-btn:hover { background:#FF3D5A22; }
    #sidebar-subtitle { font-size:11px; color:#888; letter-spacing:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* 요약 패널 — 한줄 */
    #summary-panel { display:none; padding:6px 14px; background:#12193a; border-bottom:1px solid #0f3460; flex-shrink:0; }

    /* 일차 필터 — sticky */
    .day-filter-bar { position:sticky; top:0; z-index:5; background:#16213e; display:flex; gap:4px; padding:5px 8px; flex-wrap:wrap; border-bottom:1px solid #0f346022; }
    .day-filter-btn {
      background:#1a1a2e; border:1px solid #0f3460; color:#888; border-radius:16px;
      padding:4px 12px; font-size:11px; cursor:pointer; transition:all .15s;
    }
    .day-filter-btn.active, .day-filter-btn:hover { background:#FF3D5A22; border-color:#FF3D5A; color:#FF3D5A; }

    #point-list { flex:1; overflow-y:auto; padding:6px 10px 8px; }

    /* 포인트 카드 */
    .point-item { background:#1a1a2e; border:1px solid #0f3460; border-radius:8px; padding:8px 10px; margin-bottom:6px; cursor:pointer; transition:all .2s; }
    .point-item:hover, .point-item.active { border-color:#FF3D5A; background:#1e1e3a; }
    .point-header { display:flex; align-items:center; gap:10px; margin-bottom:6px; }
    .point-dot { width:12px; height:12px; border-radius:50%; flex-shrink:0; }
    .point-name { font-size:14px; font-weight:600; flex:1; }
    .point-order-btns { display:flex; flex-direction:row; gap:2px; }
    .order-btn { background:#0f3460; border:none; color:#aaa; width:22px; height:18px; border-radius:3px; cursor:pointer; font-size:10px; display:flex; align-items:center; justify-content:center; transition:all .15s; }
    .order-btn:hover:not(:disabled) { background:#FF3D5A; color:white; }
    .point-meta { font-size:11px; color:#888; display:flex; gap:10px; flex-wrap:wrap; }
    .point-time { color:#3ecfb2; }

    /* 이동 구간 */
    .segment-item { display:flex; align-items:center; gap:8px; padding:6px 14px; margin-bottom:10px; font-size:11px; color:#666; }
    .segment-line { width:3px; height:24px; border-radius:2px; flex-shrink:0; }
    .segment-info { flex:1; }

    /* 하단 버튼들 */
    #bottom-bar { padding:7px 10px; display:flex; flex-direction:column; gap:5px; flex-shrink:0; }
    #add-btn { padding:8px; background:#FF3D5A; border:none; border-radius:8px; color:white; font-size:13px; font-weight:600; cursor:pointer; letter-spacing:1px; transition:all .2s; }
    #add-btn:hover { background:#e03050; transform:translateY(-1px); }
    #bottom-actions { display:flex; gap:6px; }
    #export-btn, #pdf-btn, #share-btn { display:none; flex:1; padding:6px; background:#0f3460; border:1px solid #1e3a6a; border-radius:6px; color:#aaa; font-size:11px; cursor:pointer; }
    #export-btn:hover { border-color:#FF3D5A; color:#FF3D5A; }
    #pdf-btn:hover { border-color:#3ecfb2; color:#3ecfb2; }
    #share-btn:hover { border-color:#2ECC71; color:#2ECC71; }
    #share-btn.copied { border-color:#2ECC71; color:#2ECC71; }
    #pdf-btn.loading { opacity:0.5; cursor:wait; }
    #import-label { flex:1; padding:6px; background:#0f3460; border:1px solid #1e3a6a; border-radius:6px; color:#aaa; font-size:11px; cursor:pointer; text-align:center; display:block; }
    #import-label:hover { border-color:#FF3D5A; color:#FF3D5A; }
    #import-file { display:none; }

    /* ── 사이드바 리사이저 ── */
    #sidebar-resizer { width:6px; background:transparent; cursor:col-resize; flex-shrink:0; transition:background .15s; z-index:10; position:relative; }
    #sidebar-resizer:hover, #sidebar-resizer.dragging { background:#FF3D5A66; }
    #sidebar-resizer::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:2px; height:40px; background:#FF3D5A44; border-radius:2px; }

    /* 모바일 반응형 */
    @media (max-width: 768px) {
      body { flex-direction: column; }
      #sidebar { width: 100% !important; height: 45vh; min-width: unset; border-right: none; border-bottom: none; order: -1; }
      #sidebar-resizer { width: 100% !important; height: 10px !important; cursor: row-resize !important; border-top: 1px solid #0f3460; border-right: none; }
      #sidebar-resizer::after { width: 40px !important; height: 2px !important; top: 50% !important; left: 50% !important; }
      #map-container { flex: 1; min-height: 0; }
      .modal-box { width: 95vw; padding: 16px; }
      #bottom-bar { padding: 8px; }
      #bottom-actions { flex-wrap: wrap; }
    }

    /* ── 지도 ── */
    #map-container { flex:1; position:relative; }
    #map { width:100%; height:100%; }
    #map-hint { position:absolute; top:16px; left:50%; transform:translateX(-50%); background:rgba(15,52,96,.9); color:#aaa; font-size:12px; padding:8px 16px; border-radius:20px; z-index:1000; pointer-events:none; white-space:nowrap; }

    /* ── 공통 모달 ── */
    .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:9999; align-items:center; justify-content:center; }
    .modal-overlay.open { display:flex; }
    .modal-box { background:#16213e; border:1px solid #0f3460; border-radius:16px; padding:24px; width:440px; max-width:95vw; max-height:88vh; overflow-y:auto; }
    .modal-box h2 { font-size:18px; font-weight:700; margin-bottom:20px; color:#FF3D5A; }

    .form-group { margin-bottom:14px; }
    .form-group label { display:block; font-size:12px; color:#888; margin-bottom:5px; letter-spacing:.4px; }
    .form-group input, .form-group select, .form-group textarea {
      width:100%; background:#1a1a2e; border:1px solid #0f3460; border-radius:8px;
      padding:10px 12px; color:white; font-size:14px; outline:none; transition:border-color .2s;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:#FF3D5A; }
    .form-group textarea { resize:vertical; min-height:65px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .modal-btns { display:flex; gap:10px; margin-top:18px; }
    .btn-save   { flex:1; padding:12px; background:#FF3D5A; border:none; border-radius:8px; color:white; font-size:14px; font-weight:600; cursor:pointer; }
    .btn-cancel { padding:12px 18px; background:#0f3460; border:none; border-radius:8px; color:#aaa; font-size:14px; cursor:pointer; }
    .btn-delete { padding:12px; background:transparent; border:1px solid #333; border-radius:8px; color:#555; font-size:14px; cursor:pointer; }
    .btn-delete:hover { border-color:#FF3D5A; color:#FF3D5A; }

    /* 출발 미리보기 */
    #depart-preview { font-size:12px; color:#3ecfb2; padding:4px 0 6px; }

    /* 섹션 구분 */
    .section-divider { border:none; border-top:1px solid #0f3460; margin:16px 0; }

    /* 외부 링크 */
    #link-list { margin-top:8px; }
    .link-row-inputs { display:flex; gap:6px; }
    .link-row-inputs input { flex:1; }
    #add-link-btn { padding:10px 14px; background:#0f3460; border:1px solid #1e3a6a; border-radius:8px; color:#aaa; font-size:13px; cursor:pointer; white-space:nowrap; }
    #add-link-btn:hover { border-color:#FF3D5A; color:#FF3D5A; }

    /* 파일 업로드 */
    #file-upload-label { display:block; padding:10px 12px; background:#1a1a2e; border:1px dashed #0f3460; border-radius:8px; text-align:center; color:#555; font-size:12px; cursor:pointer; }
    #file-upload-label:hover { border-color:#FF3D5A; color:#aaa; }
    #file-status { font-size:11px; color:#3ecfb2; margin-top:4px; min-height:16px; }

    /* 스크롤바 */
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:#0f3460; border-radius:2px; }
    select option { background:#16213e; }
  </style>
</head>
<body>

<!-- 사이드바 -->
<div id="sidebar">
  <div id="sidebar-header">
    <div id="sidebar-header-row">
      <button id="back-btn">← List</button>
      <h1>JAEWALK</h1>
    </div>
    <div id="sidebar-subtitle">TRAVEL PLANNER</div>
  </div>

  <div id="summary-panel"></div>
  <div id="point-list"></div>

  <div id="bottom-bar">
    <button id="add-btn">+ Add Trip</button>
    <div id="bottom-actions">
      <button id="export-btn">📤 Export</button>
      <button id="pdf-btn">📄 PDF</button>
      <button id="share-btn" style="display:none">🔗 Share (View Only)</button>
      <label id="import-label" for="import-file">⬆ Import</label>
      <input type="file" id="import-file" accept=".json" />
    </div>
  </div>
</div>

<!-- 사이드바 리사이저 -->
<div id="sidebar-resizer"></div>

<!-- 지도 -->
<div id="map-container">
  <div id="map-hint">Select a trip or create a new one</div>
  <div id="map"></div>
</div>

<!-- 여행 모달 -->
<div id="trip-modal-overlay" class="modal-overlay">
  <div class="modal-box">
    <h2 id="trip-modal-title">New Trip</h2>
    <div class="form-group">
      <label>Trip Name *</label>
      <input type="text" id="tf-name" placeholder="e.g. Las Vegas 2025-09" />
    </div>
    <div class="form-group">
      <label>Notes (optional)</label>
      <input type="text" id="tf-desc" placeholder="e.g. Family trip, 5 days" />
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeTripModal()">Cancel</button>
      <button class="btn-delete" id="trip-btn-delete" style="display:none" onclick="deleteTripModal()">Delete</button>
      <button class="btn-save" onclick="saveTripModal()">Save</button>
    </div>
  </div>
</div>

<!-- 장소 모달 -->
<div id="modal-overlay" class="modal-overlay">
  <div class="modal-box">
    <h2 id="modal-title">Add Place</h2>

    <!-- 검색 -->
    <div class="form-group">
      <label>Search Place (Worldwide)</label>
      <div style="position:relative">
        <input type="text" id="f-search" placeholder="e.g. Eiffel Tower / Myeongdong / Vancouver Airport" autocomplete="off" />
        <div id="search-results" style="display:none;position:absolute;top:100%;left:0;right:0;background:#1a1a2e;border:1px solid #FF3D5A;border-radius:0 0 8px 8px;z-index:99999;max-height:200px;overflow-y:auto;"></div>
      </div>
      <div id="search-status" style="font-size:11px;color:#555;margin-top:4px;min-height:16px;"></div>
    </div>

    <!-- 위치 확정 -->
    <div id="location-confirm" style="display:none;background:#0f3460;border-radius:8px;padding:10px 12px;font-size:12px;color:#3ecfb2;margin-bottom:12px;">
      📍 Location set — drag marker to fine-tune
    </div>

    <div class="form-group">
      <label>Place Name *</label>
      <input type="text" id="f-name" placeholder="e.g. Eiffel Tower" />
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Type</label>
        <select id="f-type">
          <option value="departure">🏠 Departure</option>
          <option value="airport">✈️ Airport</option>
          <option value="hotel">🏨 Hotel</option>
          <option value="food">🍽️ Food</option>
          <option value="attraction">🗺️ Attraction</option>
          <option value="shopping">🛍️ Shopping</option>
          <option value="transport">🚌 Transport</option>
          <option value="other" selected>📍 Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Day</label>
        <input type="number" id="f-day" value="1" min="1" max="99" />
      </div>
    </div>

    <!-- 시간: 도착(드롭다운) + 체류시간(드롭다운) -->
    <div class="form-row">
      <div class="form-group">
        <label>Arrival Time <span style="font-size:10px;color:#3ecfb244">(auto-calculated)</span></label>
        <select id="f-arrive"></select>
      </div>
      <div class="form-group">
        <label>Stay Duration <span style="font-size:10px;color:#FF3D5A66">→ Departure auto</span></label>
        <select id="f-stay"></select>
      </div>
    </div>
    <div id="depart-preview" style="display:none;font-size:12px;color:#3ecfb2;padding:2px 0 8px;">Departs --:--</div>

    <div class="form-group">
      <label>Tag</label>
      <input type="text" id="f-tag" placeholder="e.g. Must-see, Reservation needed" />
    </div>

    <div class="form-group">
      <label>Note</label>
      <textarea id="f-note" placeholder="Notes, reservation number, entry time, etc."></textarea>
    </div>

    <hr class="section-divider" />

    <div class="form-group">
      <label>Departure Transport (to next place)</label>
      <select id="f-transport">
        <option value="">None</option>
        <option value="walk">🚶 Walk</option>
        <option value="car">🚗 Car</option>
        <option value="uber">🚕 Uber/Taxi</option>
        <option value="transit">🚌 Bus/Subway</option>
        <option value="flight">✈️ Flight</option>
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Travel Duration <span id="duration-auto-status" style="font-size:10px;color:#3ecfb2;margin-left:4px;"></span></label>
        <select id="f-duration">
          <option value="">-</option>
          <option value="5">5 min</option>
          <option value="10">10 min</option>
          <option value="15">15 min</option>
          <option value="20">20 min</option>
          <option value="25">25 min</option>
          <option value="30">30 min</option>
          <option value="45">45 min</option>
          <option value="60">1 hr</option>
          <option value="75">1 hr 15 min</option>
          <option value="90">1 hr 30 min</option>
          <option value="105">1 hr 45 min</option>
          <option value="120">2 hr</option>
          <option value="150">2 hr 30 min</option>
          <option value="180">3 hr</option>
          <option value="210">3 hr 30 min</option>
          <option value="240">4 hr</option>
          <option value="300">5 hr</option>
          <option value="360">6 hr</option>
        </select>
      </div>
      <div class="form-group">
        <label>Travel Cost ($)</label>
        <input type="number" id="f-cost" placeholder="0" min="0" step="0.5" />
      </div>
    </div>

    <hr class="section-divider" />

    <!-- 외부 링크 -->
    <div class="form-group">
      <label>External Link</label>
      <div class="link-row-inputs">
        <input type="url" id="link-url"   placeholder="https://..." />
        <input type="text" id="link-label" placeholder="Display Name" style="max-width:120px" />
        <button id="add-link-btn">+ Add</button>
      </div>
      <div id="link-list"></div>
    </div>

    <!-- 파일 업로드 (R2) -->
    <div class="form-group">
      <label>File Attachment (R2 upload)</label>
      <label id="file-upload-label" for="f-files">📎 Click to select files (PDF, images, etc.)</label>
      <input type="file" id="f-files" multiple style="display:none" />
      <div id="file-status"></div>
    </div>

    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-delete" id="btn-delete" style="display:none" onclick="deletePoint()">Delete</button>
      <button class="btn-save" onclick="savePoint()">Save</button>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- 사이드바 리사이즈 (인라인 — 모듈 밖에서 동작해야 함) -->
<script>
(function(){
  const sb = document.getElementById('sidebar')
  const rs = document.getElementById('sidebar-resizer')
  const isMobile = () => window.innerWidth <= 600

  let dragging = false, startPos = 0, startSize = 0

  function onStart(pos) {
    dragging = true
    rs.classList.add('dragging')
    if (isMobile()) {
      startPos = pos; startSize = sb.offsetHeight
    } else {
      startPos = pos; startSize = sb.offsetWidth
    }
  }

  function onMove(pos) {
    if (!dragging) return
    if (isMobile()) {
      const maxH = Math.floor(window.innerHeight * 0.75)
      const newH = Math.max(120, Math.min(maxH, startSize + (pos - startPos)))
      sb.style.height = newH + 'px'
    } else {
      const maxW = Math.floor(window.innerWidth * 0.5)
      const newW = Math.max(200, Math.min(maxW, startSize + (pos - startPos)))
      sb.style.width = newW + 'px'
      sb.style.minWidth = newW + 'px'
    }
  }

  function onEnd() {
    if (!dragging) return
    dragging = false
    rs.classList.remove('dragging')
  }

  rs.addEventListener('mousedown', e => { onStart(isMobile() ? e.clientY : e.clientX); e.preventDefault() })
  document.addEventListener('mousemove', e => onMove(isMobile() ? e.clientY : e.clientX))
  document.addEventListener('mouseup', onEnd)

  rs.addEventListener('touchstart', e => { onStart(isMobile() ? e.touches[0].clientY : e.touches[0].clientX); e.preventDefault() }, { passive: false })
  document.addEventListener('touchmove', e => { if (dragging) { onMove(isMobile() ? e.touches[0].clientY : e.touches[0].clientX); e.preventDefault() } }, { passive: false })
  document.addEventListener('touchend', onEnd)
})()
</script>

<script type="module" src="/src/main.js"></script>
</body>
</html>
